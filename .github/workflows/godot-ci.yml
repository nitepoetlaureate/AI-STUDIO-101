# Headless GUT + gdcli doctor on push/PR. Does not prove Sprint 1 complete — see docs/GATE-CHECK-AUDIT-REMEDIATION-2026-04-23.md
name: godot-ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot 4.6.2
        run: |
          set -euo pipefail
          GODOT_URL="https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          curl -fsSL -L -o godot.zip "$GODOT_URL"
          unzip -q godot.zip
          chmod +x Godot_v4.6.2-stable_linux.x86_64
          sudo mv Godot_v4.6.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Bootstrap project (import / first frames)
        run: godot --headless --path . --quit-after 2

      - name: Run GUT (tests/unit)
        run: godot --headless --path . -s addons/gut/gut_cmdln.gd -- -gdir=res://tests/unit -gexit

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: gdcli doctor
        run: npx -y gdcli-godot doctor
